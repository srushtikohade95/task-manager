<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Task Manager</h1>
            <p>Organize your day seamlessly</p>
        </header>

        <main>
            <div id="error-container" class="error-container hidden"></div>

            <form id="task-form" class="task-form">
                <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" />
                <button type="submit" id="add-btn">Add Task</button>
            </form>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
            </div>

            <div class="task-list-container">
                <ul id="task-list" class="task-list">
                    <!-- Tasks injected by script.js -->
                </ul>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
